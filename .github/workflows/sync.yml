name: Terraform + Sync

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Full sync (re-fetch all events)'
        required: false
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]
      apply_terraform:
        description: 'Run terraform apply (creates cluster if missing)'
        required: false
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]

permissions:
  contents: write

env:
  HF_API_KEY: ${{ secrets.HF_API_KEY }}
  DEV_LLM_KEY: ${{ secrets.LLM_API_KEY }}
  DEV_LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
  DEV_LLM_MODEL: ${{ vars.LLM_MODEL }}
  PUBKEYS: ${{ vars.PUBKEYS }}
  PUBKEY_LABELS: ${{ vars.PUBKEY_LABELS }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iac

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.9'

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          terraform plan \
            -var="qdrant_cloud_api_key=${{ secrets.QDRANT_CLOUD_API_KEY }}" \
            -var="qdrant_cloud_account_id=${{ secrets.QDRANT_CLOUD_ACCOUNT_ID }}" \
            -out=tfplan

      - name: Terraform Apply
        id: apply
        if: steps.plan.outcome == 'success' && (github.event.inputs.apply_terraform == 'true' || github.event_name == 'schedule')
        continue-on-error: true
        run: terraform apply -auto-approve tfplan

      - name: Commit Terraform State
        id: commit
        if: always()
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iac/terraform.tfstate
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: update terraform state [skip ci]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Terraform Plan Failed
        if: steps.plan.outcome == 'failure'
        run: |
          echo "::warning::Terraform plan failed. Sync will use existing QDRANT_URL."
          exit 0

  sync:
    needs: terraform
    runs-on: ubuntu-latest
    if: always()
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Read Qdrant credentials from Terraform state
        run: |
          if [ -f ../iac/terraform.tfstate ]; then
            URL=$(python3 -c "import json; d=json.load(open('../iac/terraform.tfstate')); print(d.get('outputs',{}).get('cluster_url',{}).get('value',''))" 2>/dev/null || echo '')
            KEY=$(python3 -c "import json; d=json.load(open('../iac/terraform.tfstate')); print(d.get('outputs',{}).get('app_api_key',{}).get('value',''))" 2>/dev/null || echo '')
            READ_KEY=$(python3 -c "import json; d=json.load(open('../iac/terraform.tfstate')); print(d.get('outputs',{}).get('read_only_key',{}).get('value',''))" 2>/dev/null || echo '')
          fi
          URL="${URL:-${{ vars.QDRANT_URL }}}"
          KEY="${KEY:-${{ secrets.QDRANT_API_KEY }}}"
          if [ -z "$URL" ]; then
            echo "::warning::No QDRANT_URL available. Skipping sync."
            echo "HAS_CREDENTIALS=false" >> $GITHUB_ENV
          else
            echo "QDRANT_URL=$URL" >> $GITHUB_ENV
            echo "QDRANT_API_KEY=$KEY" >> $GITHUB_ENV
            echo "QDRANT_READ_KEY=${READ_KEY:-$KEY}" >> $GITHUB_ENV
            echo "HAS_CREDENTIALS=true" >> $GITHUB_ENV
            # Write config for consumer-site (baked into build)
            HF_REV=$(echo -n "${{ secrets.HF_API_KEY }}" | rev)
            echo "{\"url\":\"$URL\",\"readOnlyKey\":\"${READ_KEY:-$KEY}\",\"_h\":\"$HF_REV\"}" > ../consumer-site/public/qdrant-config.json
          fi

      - uses: actions/setup-python@v5
        if: env.HAS_CREDENTIALS == 'true'
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: env.HAS_CREDENTIALS == 'true'
        run: pip install -r requirements.txt

      - name: Fetch notes from relays
        if: env.HAS_CREDENTIALS == 'true'
        id: fetch
        run: |
          FULL_FLAG=""
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            FULL_FLAG="--full"
          fi
          python -m worker.runner fetch $FULL_FLAG

      - name: Enrich notes (resolve usernames + referenced events)
        if: env.HAS_CREDENTIALS == 'true'
        id: enrich
        run: python -m worker.runner enrich

      - name: Embed and index to Qdrant
        if: env.HAS_CREDENTIALS == 'true'
        id: index
        run: python -m worker.runner index

      - name: Commit changes
        if: env.HAS_CREDENTIALS == 'true'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync nostr notes [skip ci]"
            git push
          fi

  notify:
    needs: [terraform, sync]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Job failed
        run: |
          echo "::error::Pipeline failed. Check terraform and sync logs."
          echo "Terraform: ${{ needs.terraform.result }}"
          echo "Sync: ${{ needs.sync.result }}"
