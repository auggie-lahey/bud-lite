name: Generate Soul Hints

on:
  schedule:
    # Every Monday at 04:00 UTC
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

env:
  DEV_LLM_KEY: ${{ secrets.LLM_API_KEY }}
  DEV_LLM_BASE_URL: "https://api.z.ai/api/coding/paas/v4"
  DEV_LLM_MODEL: "GLM-5.1"
  PUBKEYS: ${{ vars.PUBKEYS }}
  PUBKEY_LABELS: ${{ vars.PUBKEY_LABELS }}

jobs:
  generate-souls:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Read Qdrant credentials
        run: |
          if [ -f ../iac/terraform.tfstate ]; then
            URL=$(python3 -c "import json; d=json.load(open('../iac/terraform.tfstate')); print(d.get('outputs',{}).get('cluster_url',{}).get('value',''))" 2>/dev/null || echo '')
            KEY=$(python3 -c "import json; d=json.load(open('../iac/terraform.tfstate')); print(d.get('outputs',{}).get('app_api_key',{}).get('value',''))" 2>/dev/null || echo '')
          fi
          URL="${URL:-${{ vars.QDRANT_URL }}}"
          KEY="${KEY:-${{ secrets.QDRANT_API_KEY }}}"
          if [ -z "$URL" ] || [ -z "$DEV_LLM_KEY" ]; then
            echo "::warning::Missing QDRANT_URL or LLM_API_KEY. Skipping."
            echo "HAS_CREDENTIALS=false" >> $GITHUB_ENV
          else
            echo "QDRANT_URL=$URL" >> $GITHUB_ENV
            echo "QDRANT_API_KEY=$KEY" >> $GITHUB_ENV
            echo "HAS_CREDENTIALS=true" >> $GITHUB_ENV
          fi

      - uses: actions/setup-python@v5
        if: env.HAS_CREDENTIALS == 'true'
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        if: env.HAS_CREDENTIALS == 'true'
        run: pip install -r requirements.txt && pip install websockets

      - name: Generate soul files and hints
        if: env.HAS_CREDENTIALS == 'true'
        run: python -m worker.runner souls

      - name: Copy soul-hints and soul files to consumer-site
        if: env.HAS_CREDENTIALS == 'true'
        run: |
          mkdir -p ../consumer-site/public
          # Copy full soul .md files for profile pages
          mkdir -p ../consumer-site/public/souls
          if ls data/souls/*.md 1>/dev/null 2>&1; then
            cp data/souls/*.md ../consumer-site/public/souls/
            echo "Copied $(ls data/souls/*.md | wc -l) soul .md files"
          else
            echo "::warning::No soul .md files found"
          fi
          if [ -f data/souls/hints.json ]; then
            cp data/souls/hints.json ../consumer-site/public/soul-hints.json
            echo "Copied soul-hints.json"
            # Merge labels, pictures from PUBKEY_LABELS and existing file
            python3 -c "
          import json, os, urllib.request
          with open('../consumer-site/public/soul-hints.json') as f:
              data = json.load(f)
          pubkeys = [p.strip() for p in os.environ.get('PUBKEYS', '').split(',') if p.strip()]
          labels_raw = os.environ.get('PUBKEY_LABELS', '{}')
          try: labels = json.loads(labels_raw)
          except: labels = {}
          data.setdefault('labels', {}).update(labels)
          # Fetch profile pictures from Nostr relays via WebSocket (kind:0 metadata)
          import asyncio, json as _json, ssl, hashlib
          try:
              import websockets
              _has_ws = True
          except ImportError:
              _has_ws = False
          pictures = data.get('pictures', {})
          if _has_ws and pubkeys:
              async def _fetch_pictures():
                  relay_url = 'wss://relay.damus.io'
                  pics = {}
                  async with websockets.connect(relay_url, ssl=ssl.create_default_context(), open_timeout=10) as ws:
                      sub_id = 'pics_' + hashlib.md5(','.join(pubkeys).encode()).hexdigest()[:8]
                      filt = {'kinds': [0], 'authors': pubkeys, 'limit': len(pubkeys)}
                      await ws.send(_json.dumps(['REQ', sub_id, filt]))
                      while True:
                          try:
                              msg = await asyncio.wait_for(ws.recv(), timeout=10)
                              ev = _json.loads(msg)
                              if ev[0] == 'EVENT' and ev[2].get('kind') == 0:
                                  meta = _json.loads(ev[2].get('content', '{}'))
                                  pk = ev[2].get('pubkey', '')
                                  pic = meta.get('picture', '')
                                  if pic:
                                      pics[pk] = pic
                                      print(f'Picture: {labels.get(pk, pk[:8])} -> {pic[:60]}')
                              elif ev[0] == 'EOSE':
                                  break
                          except asyncio.TimeoutError:
                              break
                      try: await ws.send(_json.dumps(['CLOSE', sub_id]))
                      except: pass
                  return pics
              fetched = asyncio.run(_fetch_pictures())
              pictures.update(fetched)
              print(f'Fetched {len(fetched)} pictures via relay')
          else:
              print('No websockets lib or no pubkeys — skipping picture fetch')
          data['pictures'] = pictures
          with open('../consumer-site/public/soul-hints.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f'Updated soul-hints.json: {len(data.get(\"hints\", {}))} hints, {len(pictures)} pictures')
          "
          else
            echo "::warning::No hints.json generated"
          fi

      - name: Commit and push
        if: env.HAS_CREDENTIALS == 'true'
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add consumer-site/public/soul-hints.json consumer-site/public/souls/
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add consumer-site/public/soul-hints.json consumer-site/public/souls/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate soul hints [skip ci]"
            git pull --rebase origin main || true
            git push
          fi
