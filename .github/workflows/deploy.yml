name: Deploy Consumer Site

on:
  push:
    branches: [main]
    paths:
      - 'consumer-site/**'
      - 'iac/terraform.tfstate'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: consumer-site

    steps:
      - uses: actions/checkout@v4

      - name: Read Qdrant credentials from Terraform state
        run: |
          if [ -f ../iac/terraform.tfstate ]; then
            URL=$(python3 -c "import json; d=json.load(open('../iac/terraform.tfstate')); print(d.get('outputs',{}).get('cluster_url',{}).get('value',''))" 2>/dev/null || echo '')
            READ_KEY=$(python3 -c "import json; d=json.load(open('../iac/terraform.tfstate')); print(d.get('outputs',{}).get('read_only_key',{}).get('value',''))" 2>/dev/null || echo '')
          fi
          URL="${URL:-${{ vars.QDRANT_URL }}}"
          READ_KEY="${READ_KEY:-${{ secrets.QDRANT_API_KEY }}}"
          mkdir -p public
          HF_REV=$(echo -n "${{ secrets.HF_API_KEY }}" | rev)
          echo "{\"url\":\"$URL\",\"readOnlyKey\":\"$READ_KEY\",\"_h\":\"$HF_REV\"}" > public/qdrant-config.json

      - name: Build
        run: |
          echo "=== public/ contents ==="
          ls -la public/ 2>&1 || true
          echo "=== public/soul-hints.json size ==="
          wc -c public/soul-hints.json 2>&1 || true
          echo "=== public/souls/ ==="
          ls public/souls/ 2>&1 || true
          npm ci
          npx vite build

      - name: Deploy to GitHub Pages
        id: deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npx gh-pages -d dist -r "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

      - name: Summary
        if: always()
        run: |
          PAGES_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "## :rocket: Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** $PAGES_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Chat:** ${PAGES_URL}#/chat" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
